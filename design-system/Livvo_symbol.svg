<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Símbolo VV de Livvo (receta del skill livvo-designer).
       Primera V hereda el color del contexto (currentColor):
       claro -> #0D1424 / oscuro -> #F0F4FF. Segunda V siempre teal. -->
  <polyline points="24,20 43,80 62,20" fill="none" stroke="currentColor"
            stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="40,20 59,80 78,20" fill="none" stroke="#00C7B4"
            stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
